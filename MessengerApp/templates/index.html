<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DEGE - Чат</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', 'Arial', sans-serif;
    }
    body {
        background: #0A0E17; /* Глубокий космос */
        color: #E0E0FF;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }
    .sidebar {
        width: 300px;
        background: linear-gradient(180deg, #121524, #0F1220); /* Тёмный градиент */
        border-right: 1px solid #2A2F45;
        display: flex;
        flex-direction: column;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
    }
    .sidebar-header {
        padding: 20px;
        background: linear-gradient(90deg, #4A00E0, #8E2DE2); /* Фиолетовый градиент */
        text-align: center;
        font-size: 1.4em;
        font-weight: 600;
        color: white;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        letter-spacing: 0.5px;
    }
    .friends-container {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        scrollbar-width: thin;
        scrollbar-color: #4A00E0 #121524;
    }
    .friends-container::-webkit-scrollbar {
        width: 6px;
    }
    .friends-container::-webkit-scrollbar-track {
        background: #0F1220;
    }
    .friends-container::-webkit-scrollbar-thumb {
        background: #4A00E0;
        border-radius: 3px;
    }
    .friend {
        padding: 12px 15px;
        border-bottom: 1px solid #2A2F45;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        border-radius: 10px;
        transition: all 0.25s ease;
        position: relative;
        overflow: hidden;
    }
    .friend:hover {
        background: rgba(74, 0, 224, 0.15);
        transform: translateY(-1px);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }
    .friend::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 3px;
        height: 100%;
        background: transparent;
        transition: background 0.3s;
    }
    .friend:hover::before {
        background: #8E2DE2;
    }
    .status {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        box-shadow: 0 0 6px rgba(74, 0, 224, 0.6);
    }
    .status.online {
        background: #00D2FF; /* Голубой — как звезда */
        animation: pulse 1.5s infinite;
    }
    .status.offline {
        background: #666;
    }
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.6; }
        100% { opacity: 1; }
    }
    .add-friend {
        padding: 15px;
        background: #0F1220;
        border-top: 1px solid #2A2F45;
    }
    .add-friend input {
        width: 100%;
        padding: 11px;
        background: #1A1E2C;
        border: 1px solid #3A3F55;
        border-radius: 8px;
        color: #E0E0FF;
        font-size: 0.95em;
        margin-bottom: 10px;
        transition: border 0.2s;
    }
    .add-friend input:focus {
        outline: none;
        border-color: #8E2DE2;
        box-shadow: 0 0 0 2px rgba(142, 45, 226, 0.2);
    }
    .add-friend button {
        width: 100%;
        padding: 11px;
        background: linear-gradient(90deg, #4A00E0, #8E2DE2);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.95em;
        font-weight: 500;
        transition: all 0.2s;
        box-shadow: 0 2px 6px rgba(74, 0, 224, 0.3);
    }
    .add-friend button:hover {
        background: linear-gradient(90deg, #3A00B0, #7A1DC0);
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(74, 0, 224, 0.4);
    }

    /* Чат */
    .chat {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #0C101B;
    }
    .chat-header {
        padding: 15px;
        background: linear-gradient(90deg, #1A1F30, #121524);
        color: #FFFFFF;
        font-size: 1.2em;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid #2A2F45;
    }
    .messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .message-container {
        max-width: 70%;
        display: flex;
        flex-direction: column;
    }
    .message {
        padding: 12px 16px;
        border-radius: 14px;
        font-size: 1em;
        line-height: 1.5;
        word-wrap: break-word;
    }
    .message.sent {
        background: linear-gradient(90deg, #4A00E0, #8E2DE2);
        color: white;
        align-self: flex-end;
        margin-left: auto;
        border-bottom-right-radius: 4px;
    }
    .message.received {
        background: rgba(255, 255, 255, 0.08);
        color: #E0E0FF;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
    }
    .message strong {
        font-size: 0.85em;
        color: #8A8AFF;
        margin-bottom: 4px;
        display: block;
    }
    .input-area {
        display: flex;
        padding: 12px 10px;
        background: #0F1220;
        border-top: 1px solid #2A2F45;
    }
    #message-input {
        flex: 1;
        padding: 13px;
        background: #1A1E2C;
        border: 1px solid #3A3F55;
        border-radius: 10px;
        color: #E0E0FF;
        font-size: 1em;
        transition: border 0.2s;
    }
    #message-input:focus {
        outline: none;
        border-color: #8E2DE2;
        box-shadow: 0 0 0 2px rgba(142, 45, 226, 0.2);
    }
    .send-btn {
        margin-left: 10px;
        padding: 0 24px;
        background: linear-gradient(90deg, #4A00E0, #8E2DE2);
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 1em;
        font-weight: 500;
        transition: all 0.2s;
        box-shadow: 0 2px 6px rgba(74, 0, 224, 0.3);
    }
    .send-btn:hover {
        background: linear-gradient(90deg, #3A00B0, #7A1DC0);
        transform: translateY(-1px);
    }
</style>

</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">DEGE - Чат</div>
        <div class="friends-container" id="friends-list">
            <!-- Друзья и группы будут здесь -->
        </div>
        <div class="add-friend">
            <input type="text" id="friend-username" placeholder="Имя пользователя">
            <button onclick="addFriend()">Добавить в друзья</button>

            <input type="text" id="group-name" placeholder="Название группы" style="margin-top: 10px;">
            <button onclick="createGroup()">Создать группу</button>
        </div>
    </div>

    <div class="chat">
        <div class="chat-header" id="chat-header">Выберите чат</div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const current_user = urlParams.get('username');
    const socket = io();

    let selected_friend = null;
    let current_group = null;
    let userStatus = {};

    // Следим за активными сокет-соединениями, чтобы избежать дублирования
    socket.emit('login', { username: current_user });

    function loadFriends() {
        fetch(`/friends/${current_user}`)
            .then(res => res.json())
            .then(friends => {
                const list = document.getElementById('friends-list');
                list.innerHTML = ''; // <-- ОЧИЩАЕМ ПЕРЕД ДОБАВЛЕНИЕМ
                friends.forEach(friend => {
                    const div = document.createElement('div');
                    div.className = 'friend';
                    div.dataset.username = friend;
                    div.innerHTML = `
                        <span class="status ${userStatus[friend] === 'online' ? 'online' : 'offline'}" id="status-${friend}"></span>
                        <span>${friend}</span>
                    `;
                    div.onclick = () => openChat(friend);
                    list.appendChild(div);
                });
                loadGroups(); // <-- Грузим группы ПОСЛЕ друзей
            });
    }

    function loadGroups() {
        fetch(`/groups/${current_user}`)
            .then(res => res.json())
            .then(groups => {
                const list = document.getElementById('friends-list');
                // Удаляем только групповые элементы, чтобы не трогать друзей
                Array.from(list.children).forEach(child => {
                    if (child.dataset.group) child.remove();
                });
                for (const [gid, group] of Object.entries(groups)) {
                    const div = document.createElement('div');
                    div.className = 'friend';
                    div.dataset.group = gid;
                    div.innerHTML = `
                        <span>👥</span>
                        <span>${group.name} <small>(${group.members.length})</small></span>
                    `;
                    div.onclick = () => openGroupChat(gid, group);
                    list.appendChild(div);
                }
            });
    }

    function addFriend() {
        const name = document.getElementById('friend-username').value.trim();
        if (!name) return alert('Введите имя');

        fetch('/add_friend', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ current_user, friend_name: name })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert(data.message);
                document.getElementById('friend-username').value = '';
                loadFriends(); // <-- Перезагружаем друзей и группы
            } else {
                alert(data.message);
            }
        });
    }

    function createGroup() {
        const button = document.querySelector('#friends-list + .add-friend button');
        const name = document.getElementById('group-name').value.trim();
        if (!name) return alert('Введите название');

        // Блокируем кнопку, чтобы избежать двойного нажатия
        button.disabled = true;
        button.textContent = 'Создаём...';

        fetch('/create_group', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ creator: current_user, name })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                document.getElementById('group-name').value = '';
                loadGroups(); // <-- Грузим группы заново
            } else {
                alert(data.message);
            }
        })
        .finally(() => {
            // Разблокируем кнопку
            button.disabled = false;
            button.textContent = 'Создать группу';
        });
    }

    function openChat(friend) {
        selected_friend = friend;
        current_group = null;
        document.getElementById('chat-header').textContent = friend;
        loadMessages(friend);
    }

    function openGroupChat(groupId, group) {
        current_group = groupId;
        selected_friend = null;
        const header = document.getElementById('chat-header');
        header.innerHTML = '';
        header.textContent = group.name;

        if (group.admins.includes(current_user) || group.creator === current_user) {
            const btn = document.createElement('button');
            btn.textContent = '⚙️';
            btn.title = 'Управление группой';
            btn.style.marginLeft = '10px';
            btn.style.fontSize = '0.9em';
            btn.onclick = () => openGroupSettings(groupId, group);
            header.appendChild(btn);
        }

        loadGroupMessages(groupId);
    }

    function openGroupSettings(groupId, group) {
        const action = prompt(
            `Управление группой:\n` +
            `1 — Переименовать\n` +
            `2 — Добавить участника\n` +
            `3 — Назначить админа\n` +
            `4 — Удалить участника\n` +
            `Введите номер действия:`
        );

        if (action === '1') {
            const name = prompt('Новое название:', group.name);
            if (!name) return;
            fetch('/rename_group', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ requester: current_user, group_id: groupId, name })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Название изменено');
                } else {
                    alert('Ошибка: ' + data.message);
                }
            });
        }

        else if (action === '2') {
            const username = prompt('Имя пользователя:');
            if (!username) return;
            fetch('/add_to_group', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ requester: current_user, group_id: groupId, username })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Добавлен');
                    loadGroups(); // <-- Обновляем список групп
                } else {
                    alert('Ошибка: ' + data.message);
                }
            });
        }

        else if (action === '3') {
            const username = prompt('Имя пользователя для повышения:');
            if (!username) return;
            fetch('/make_admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ requester: current_user, group_id: groupId, username })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Теперь админ');
                } else {
                    alert('Ошибка: ' + data.message);
                }
            });
        }

        else if (action === '4') {
            const username = prompt('Кого удалить:');
            if (!username) return;
            if (username === group.creator) return alert('Нельзя удалить создателя');
            fetch('/remove_from_group', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ requester: current_user, group_id: groupId, username })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Удалён');
                    loadGroups(); // <-- Обновляем
                } else {
                    alert('Ошибка: ' + data.message);
                }
            });
        }
    }

    function loadMessages(friend) {
        fetch(`/messages/${current_user}/${friend}`)
            .then(res => res.json())
            .then(messages => {
                const container = document.getElementById('messages');
                container.innerHTML = '';
                messages.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message-container';
                    const bubble = document.createElement('div');
                    bubble.className = msg.sender === current_user ? 'message sent' : 'message received';
                    bubble.textContent = msg.message;
                    msgDiv.appendChild(bubble);
                    container.appendChild(msgDiv);
                });
                container.scrollTop = container.scrollHeight;
            });
    }

    function loadGroupMessages(groupId) {
        fetch(`/messages/group/${groupId}`)
            .then(res => res.json())
            .then(messages => {
                const container = document.getElementById('messages');
                container.innerHTML = '';
                messages.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message-container';
                    const bubble = document.createElement('div');
                    bubble.className = msg.sender === current_user ? 'message sent' : 'message received';
                    bubble.innerHTML = `<strong>${msg.sender}</strong>: ${msg.message}`;
                    msgDiv.appendChild(bubble);
                    container.appendChild(msgDiv);
                });
                container.scrollTop = container.scrollHeight;
            });
    }

    function sendMessage() {
        if (!selected_friend && !current_group) return alert('Выберите чат');
        const input = document.getElementById('message-input');
        const message = input.value.trim();
        if (!message) return;

        const timestamp = new Date().toLocaleTimeString();

        if (selected_friend) {
            const data = { sender: current_user, receiver: selected_friend, message, timestamp };
            socket.emit('send_message', data);
            input.value = '';
            loadMessages(selected_friend);
        } else if (current_group) {
            const data = { sender: current_user, group_id: current_group, message, timestamp };
            socket.emit('send_group_message', data);
            input.value = '';
            loadGroupMessages(current_group);
        }
    }

    socket.on('receive_message', function(data) {
        if ((data.receiver === current_user || data.sender === current_user) && selected_friend === data.sender) {
            loadMessages(selected_friend);
        }
    });

    socket.on('receive_group_message', function(data) {
        if (current_group === data.group_id) {
            loadGroupMessages(current_group);
        }
    });

    socket.on('friend_added', function(data) {
        loadFriends();
    });

    socket.on('group_created', function(data) {
        loadGroups(); // <-- Грузим один раз
    });

    socket.on('group_updated', function(data) {
        loadGroups(); // <-- Грузим один раз, без дублей
    });

    socket.on('group_removed', function(data) {
        if (data.group_id === current_group) {
            alert('Вас удалили из группы');
            current_group = null;
            selected_friend = null;
            document.getElementById('chat-header').textContent = 'Группа покинута';
            document.getElementById('messages').innerHTML = '';
        }
        loadGroups();
    });

    socket.on('user_status', function(data) {
        userStatus[data.user] = data.status;
        const el = document.getElementById(`status-${data.user}`);
        if (el) {
            el.className = `status ${data.status}`;
        }
    });

    socket.on('error', function(data) {
        alert('Ошибка: ' + data.message);
    });

    // Загружаем друзей и группы при старте
    loadFriends();
</script>

</body>
</html>

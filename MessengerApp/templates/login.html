<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f2f5;
        }
        .form {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        h2 { text-align: center; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .switch {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9em;
            color: #555;
        }
        .switch a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="form">
        <h2>Вход</h2>
        <input type="text" id="username" placeholder="Имя пользователя">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <div class="switch">
            Нет аккаунта? <a href="#" onclick="showRegister()">Зарегистрироваться</a>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) return alert('Заполните все поля');

            fetch('/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, type: 'login' })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = `/chat?username=${encodeURIComponent(username)}`;
                } else {
                    alert(data.message);
                }
            });
        }

        function showRegister() {
            document.body.innerHTML = `
                <div class="form">
                    <h2>Регистрация</h2>
                    <input type="text" id="username" placeholder="Имя пользователя">
                    <input type="password" id="password" placeholder="Пароль">
                    <button onclick="register()">Зарегистрироваться</button>
                    <div class="switch">
                        Уже есть аккаунт? <a href="/" onclick="location.reload()">Войти</a>
                    </div>
                </div>
            `;
        }

        function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) return alert('Заполните все поля');

            fetch('/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, type: 'register' })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Регистрация успешна!');
                    window.location.href = `/chat?username=${encodeURIComponent(username)}`;
                } else {
                    alert(data.message);
                }
            });
        }
    </script>
</body>
</html>
